<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Trip - Shop Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { max-width: 100%; width: 100%; padding-bottom: 24px; }
    .header { max-width: 100%; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; gap:12px; }
    .header h1 { font-size:18px; margin:0; white-space:nowrap; }
    .header-right { display:flex; gap:10px; align-items:center; }
    .tab-bar { display:flex; border-bottom:1px solid var(--border); margin:0 16px; }
    .tab-bar a { flex:1; text-align:center; padding:12px; font-size:14px; font-weight:500; color:var(--text-light); cursor:pointer; border-bottom:2px solid transparent; }
    .tab-bar a.active { color:var(--primary); border-bottom-color:var(--primary); }
    .booking-row { padding:14px 16px; border-bottom:1px solid var(--border); }
    .booking-row:last-child { border-bottom:none; }
    .action-btns { display:flex; gap:6px; margin-top:8px; }
    .action-btns button { font-size:12px; padding:6px 12px; }
  </style>
</head>
<body>

  <div class="header">
    <h1 id="ownerTitle">Shop Dashboard</h1>
    <div class="header-right">
      <div id="ownerLang"></div>
      <a href="/" id="ownerBackLink" style="font-size:13px;background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;text-decoration:none;color:var(--text);white-space:nowrap">Back to App</a>
      <button onclick="ownerLogout()" id="ownerLogoutBtn" style="display:none;font-size:13px;background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;color:var(--danger)" data-i18n="logout">Logout</button>
    </div>
  </div>

  <!-- Login -->
  <div id="ownerAuth" class="px-16 mt-16">
    <div class="form-group">
      <label data-i18n="email">Email</label>
      <input type="email" class="form-input" id="ownerEmail" placeholder="owner@email.com">
    </div>
    <div class="form-group">
      <label data-i18n="password">Password</label>
      <input type="password" class="form-input" id="ownerPassword">
    </div>
    <button class="btn btn-primary" onclick="ownerLogin()" data-i18n="login">Login</button>
  </div>

  <!-- Dashboard -->
  <div id="ownerDash" class="hidden">
    <div id="shopSelector" class="px-16 mt-16"></div>

    <div class="tab-bar">
      <a class="active" onclick="switchTab('calendar',this)" data-i18n="bookings">Bookings</a>
      <a onclick="switchTab('settlement',this)" data-i18n="settlement">Settlement</a>
      <a onclick="switchTab('shopinfo',this)" data-i18n="shopInfo">Shop Info</a>
      <a onclick="switchTab('menus',this)" data-i18n="menuManage">Menu Mgmt</a>
      <a onclick="switchTab('schedule',this)" data-i18n="schedule">Schedule</a>
    </div>

    <!-- Calendar Tab -->
    <div id="tab-calendar">
      <div class="px-16 mt-8 flex gap-8">
        <input type="date" class="form-input" id="filterDate" onchange="loadOwnerBookings()" style="flex:1">
        <select class="form-input" id="filterStatus" onchange="loadOwnerBookings()" style="flex:1">
          <option value="" data-i18n="all">All</option>
          <option value="pending" data-i18n="pending">Pending</option>
          <option value="confirmed" data-i18n="confirmed">Confirmed</option>
          <option value="completed" data-i18n="completed">Completed</option>
          <option value="noshow" data-i18n="noshow">No-show</option>
          <option value="cancelled" data-i18n="cancelled">Cancelled</option>
        </select>
      </div>
      <div id="ownerBookings" class="mt-8"></div>
    </div>

    <!-- Settlement Tab -->
    <div id="tab-settlement" class="hidden">
      <div id="settlementStats"></div>
      <div id="settlementList"></div>
    </div>

    <!-- Shop Info Tab -->
    <div id="tab-shopinfo" class="hidden">
      <div class="px-16 mt-16">
        <div class="form-group">
          <label id="lbl-shopImage"></label>
          <div id="shopImagePreview" style="margin-bottom:8px"></div>
          <input type="file" accept="image/*" id="shopImageFile" onchange="uploadShopImage()" style="font-size:13px">
        </div>
        <div class="form-group">
          <label id="lbl-shopName"></label>
          <input type="text" class="form-input" id="editShopName">
        </div>
        <div class="form-group">
          <label id="lbl-shopAddr"></label>
          <input type="text" class="form-input" id="editShopAddress">
        </div>
        <div class="form-group">
          <label id="lbl-shopPhone"></label>
          <input type="text" class="form-input" id="editShopPhone">
        </div>
        <div class="form-group">
          <label id="lbl-shopDesc"></label>
          <textarea class="form-input" id="editShopDesc" rows="3"></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveShopInfo()" id="btnSaveShop"></button>
      </div>
    </div>

    <!-- Schedule Tab -->
    <div id="tab-schedule" class="hidden">
      <div class="px-16 mt-16">
        <div id="scheduleForm"></div>
        <button class="btn btn-primary mt-16" onclick="saveSchedule()" id="btnSaveSchedule"></button>
      </div>
    </div>

    <!-- Menu Management Tab -->
    <div id="tab-menus" class="hidden">
      <div class="px-16 mt-16">
        <button class="btn btn-primary" onclick="showAddMenuForm()" id="btnAddMenu"></button>
      </div>
      <div id="addMenuForm" class="hidden px-16 mt-8" style="background:var(--bg-secondary);padding:16px;margin:0 16px;border-radius:12px">
        <div class="form-group">
          <label id="lbl-menuTitle"></label>
          <input type="text" class="form-input" id="newMenuTitle">
        </div>
        <div class="form-group">
          <label id="lbl-menuDesc"></label>
          <input type="text" class="form-input" id="newMenuDesc">
        </div>
        <div style="display:flex;gap:8px">
          <div class="form-group" style="flex:1">
            <label id="lbl-menuPrice"></label>
            <input type="number" class="form-input" id="newMenuPrice">
          </div>
          <div class="form-group" style="flex:1">
            <label id="lbl-menuDuration"></label>
            <input type="number" class="form-input" id="newMenuDuration">
          </div>
        </div>
        <div class="form-group">
          <label id="lbl-menuImage"></label>
          <input type="file" accept="image/*" id="newMenuImage" style="font-size:13px">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="addMenu()" id="btnSubmitMenu"></button>
          <button class="btn btn-outline" onclick="hideAddMenuForm()" data-i18n="cancel">Cancel</button>
        </div>
      </div>
      <div id="menuList" class="mt-8"></div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/lang.js"></script>
  <script>
    let ownerShops = [];
    let currentShopId = null;

    async function ownerLogin() {
      const email = document.getElementById('ownerEmail').value;
      const password = document.getElementById('ownerPassword').value;
      const res = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) return alert(data.error || t('loginFailed'));
      setTokens(data);
      document.getElementById('ownerLogoutBtn').style.display = '';
      initDashboard();
    }

    async function initDashboard() {
      document.getElementById('ownerAuth').classList.add('hidden');
      document.getElementById('ownerDash').classList.remove('hidden');
      const res = await get('/owner/shops');
      const data = await res.json();
      ownerShops = data.shops;
      if (!ownerShops.length) {
        document.getElementById('shopSelector').innerHTML = `<p>${t('noShopsRegistered')}</p>`;
        return;
      }
      currentShopId = ownerShops[0].id;
      document.getElementById('shopSelector').innerHTML = ownerShops.length > 1
        ? `<select class="form-input" onchange="currentShopId=this.value;loadOwnerBookings()">${ownerShops.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select>`
        : `<h2 style="font-size:18px">${esc(ownerShops[0].name)}</h2>`;
      document.getElementById('filterDate').value = new Date().toISOString().slice(0, 10);
      loadOwnerBookings();
    }

    async function loadOwnerBookings() {
      const date = document.getElementById('filterDate').value;
      const status = document.getElementById('filterStatus').value;
      let qs = `?per_page=50`;
      if (date) qs += `&date=${date}`;
      if (status) qs += `&status=${status}`;
      const res = await get(`/owner/shops/${currentShopId}/bookings${qs}`);
      const data = await res.json();
      const container = document.getElementById('ownerBookings');

      if (!data.bookings.length) {
        container.innerHTML = `<div class="loading">${t('noBookingsOwner')}</div>`;
        return;
      }

      container.innerHTML = data.bookings.map(b => `
        <div class="booking-row">
          <div class="flex" style="justify-content:space-between;align-items:center">
            <strong>${esc(b.user_name || b.user_email)}</strong>
            <span class="booking-status status-${b.status}">${b.status}</span>
          </div>
          <div class="card-sub">${esc(b.menu_title)} — ${formatPrice(b.menu_price)}</div>
          <div class="card-sub">${formatDate(b.booking_time)}</div>
          ${b.request_original ? `
            <div class="card-sub mt-8" style="font-style:italic">"${esc(b.request_original)}"</div>
            ${b.request_translated ? `
              <div class="translated-box">
                <div class="label">${t('aiTranslation')}</div>
                ${esc(b.request_translated)}
              </div>
            ` : ''}
          ` : ''}
          ${b.payment_status ? `<div class="card-sub" style="font-size:12px;color:var(--text-light)">${t('paymentPending')}: ${b.payment_status}</div>` : ''}
          <div class="action-btns">
            ${b.status === 'pending' ? `
              <button class="btn btn-primary btn-sm" onclick="changeStatus('${b.id}','confirmed')">${t('confirm')}</button>
              <button class="btn btn-danger btn-sm" onclick="changeStatus('${b.id}','cancelled')">${t('cancelBtn')}</button>
            ` : ''}
            ${b.status === 'confirmed' ? `
              <button class="btn btn-primary btn-sm" onclick="changeStatus('${b.id}','completed')">${t('complete')}</button>
              <button class="btn btn-outline btn-sm" onclick="changeStatus('${b.id}','noshow')">${t('noshowBtn')}</button>
            ` : ''}
            ${(b.payment_status === 'authorized' || b.payment_status === 'captured') ? `
              <button class="btn btn-danger btn-sm" onclick="refundBooking('${b.id}')">${t('refund')}</button>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    async function changeStatus(bookingId, status) {
      const res = await patch(`/owner/bookings/${bookingId}/status`, { status });
      if (res.ok) loadOwnerBookings();
      else { const d = await res.json(); alert(d.error || 'Failed'); }
    }

    function switchTab(tab, el) {
      document.querySelectorAll('.tab-bar a').forEach(a => a.classList.remove('active'));
      el.classList.add('active');
      ['calendar','settlement','shopinfo','menus','schedule'].forEach(t =>
        document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab)
      );
      if (tab === 'settlement') loadSettlement();
      if (tab === 'shopinfo') loadShopInfo();
      if (tab === 'menus') loadMenuList();
      if (tab === 'schedule') loadSchedule();
    }

    // ── Schedule Management ──────────────────────────────
    const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    async function loadSchedule() {
      const res = await get(`/owner/shops/${currentShopId}/hours`);
      const data = await res.json();
      const existing = {};
      (data.hours || []).forEach(h => { existing[h.day_of_week] = h; });

      const container = document.getElementById('scheduleForm');
      container.innerHTML = DAY_NAMES.map((name, i) => {
        const h = existing[i] || { open_time: '10:00', close_time: '20:00', is_closed: false };
        return `
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
            <span style="width:40px;font-weight:600;font-size:14px">${name}</span>
            <input type="time" class="form-input" id="sch-open-${i}" value="${h.open_time}" style="flex:1">
            <span style="font-size:13px;color:var(--text-light)">~</span>
            <input type="time" class="form-input" id="sch-close-${i}" value="${h.close_time}" style="flex:1">
            <label style="display:flex;align-items:center;gap:4px;font-size:13px;white-space:nowrap">
              <input type="checkbox" id="sch-closed-${i}" ${h.is_closed ? 'checked' : ''}> ${t('closed')}
            </label>
          </div>`;
      }).join('');
    }

    async function saveSchedule() {
      const hours = DAY_NAMES.map((_, i) => ({
        day_of_week: i,
        open_time: document.getElementById('sch-open-' + i).value || '10:00',
        close_time: document.getElementById('sch-close-' + i).value || '20:00',
        is_closed: document.getElementById('sch-closed-' + i).checked,
      }));
      const res = await fetch(API + `/owner/shops/${currentShopId}/hours`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
        body: JSON.stringify({ hours }),
      });
      if (res.ok) alert(t('scheduleSaved'));
      else { const d = await res.json(); alert(d.error || 'Failed'); }
    }

    async function loadSettlement() {
      const res = await get(`/owner/shops/${currentShopId}/settlements`);
      const data = await res.json();
      document.getElementById('settlementStats').innerHTML = `
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-value">${formatPrice(data.total_sales)}</div>
            <div class="stat-label">${t('totalSales')}</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${formatPrice(data.total_settlement)}</div>
            <div class="stat-label">${t('settlementLabel')} (${(data.fee_rate * 100).toFixed(0)}% ${t('fee')})</div>
          </div>
        </div>
      `;
      document.getElementById('settlementList').innerHTML = data.items.map(i => `
        <div class="booking-row">
          <div class="flex" style="justify-content:space-between">
            <span>${t('amount')}: ${formatPrice(i.amount)}</span>
            <span style="color:var(--success)">+${formatPrice(i.settlement)}</span>
          </div>
          <div class="card-sub">${t('fee')}: ${formatPrice(i.fee)} | ${i.paid_at ? formatDate(i.paid_at) : '-'}</div>
        </div>
      `).join('') || `<div class="loading">${t('noSettlements')}</div>`;
    }

    // ── Shop Info ──────────────────────────────────────
    async function loadShopInfo() {
      const shop = ownerShops.find(s => s.id === currentShopId);
      if (!shop) return;
      const res = await get(`/shops/${currentShopId}`);
      const data = await res.json();
      document.getElementById('editShopName').value = data.name || '';
      document.getElementById('editShopAddress').value = data.address || '';
      document.getElementById('editShopPhone').value = data.phone || '';
      document.getElementById('editShopDesc').value = data.description || '';
      document.getElementById('shopImagePreview').innerHTML = data.image_url
        ? `<img src="${data.image_url}" style="max-width:200px;border-radius:8px">`
        : '';
    }

    async function uploadShopImage() {
      const file = document.getElementById('shopImageFile').files[0];
      if (!file) return;
      const url = await uploadFile(file);
      if (!url) return;
      const res = await patch(`/owner/shops/${currentShopId}`, { image_url: url });
      if (res.ok) loadShopInfo();
    }

    async function saveShopInfo() {
      const res = await patch(`/owner/shops/${currentShopId}`, {
        name: document.getElementById('editShopName').value,
        address: document.getElementById('editShopAddress').value,
        phone: document.getElementById('editShopPhone').value,
        description: document.getElementById('editShopDesc').value,
      });
      if (res.ok) {
        alert(t('saved'));
        const data = await res.json();
        const idx = ownerShops.findIndex(s => s.id === currentShopId);
        if (idx >= 0) ownerShops[idx].name = data.name;
      } else {
        const d = await res.json(); alert(d.error || 'Failed');
      }
    }

    // ── File Upload Helper ─────────────────────────────
    async function uploadFile(file) {
      const form = new FormData();
      form.append('file', file);
      const token = getToken();
      const res = await fetch(API + '/upload', {
        method: 'POST',
        headers: token ? { 'Authorization': 'Bearer ' + token } : {},
        body: form,
      });
      if (!res.ok) { alert(t('uploadFailed')); return null; }
      const data = await res.json();
      return data.url;
    }

    // ── Menu Management ──────────────────────────────────
    async function loadMenuList() {
      const res = await get(`/shops/${currentShopId}/menus`);
      const data = await res.json();
      const container = document.getElementById('menuList');
      if (!data.menus || !data.menus.length) {
        container.innerHTML = `<div class="loading">${t('noMenus')}</div>`;
        return;
      }
      container.innerHTML = data.menus.map(m => `
        <div class="booking-row" id="menu-row-${m.id}">
          <div style="display:flex;gap:12px;align-items:flex-start">
            ${m.image_url ? `<img src="${m.image_url}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0">` : ''}
            <div style="flex:1">
              <div class="flex" style="justify-content:space-between;align-items:center">
                <strong>${esc(m.title)}</strong>
                <span style="font-size:12px;color:${m.is_active ? 'var(--success)' : 'var(--text-light)'}">${m.is_active ? t('active') : t('inactive')}</span>
              </div>
              <div class="card-sub">${esc(m.description || '')}</div>
              <div class="card-sub">${formatPrice(m.price)} · ${m.duration}${t('min')}</div>
            </div>
          </div>
          <div class="action-btns">
            <button class="btn btn-outline btn-sm" onclick="editMenu('${m.id}')">${t('edit')}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteMenu('${m.id}')">${t('delete')}</button>
          </div>
          <div id="edit-form-${m.id}" class="hidden mt-8" style="background:var(--bg-secondary);padding:12px;border-radius:8px">
            <div class="form-group"><input type="text" class="form-input" id="em-title-${m.id}" value="${esc(m.title)}"></div>
            <div class="form-group"><input type="text" class="form-input" id="em-desc-${m.id}" value="${esc(m.description || '')}"></div>
            <div style="display:flex;gap:8px">
              <div class="form-group" style="flex:1"><input type="number" class="form-input" id="em-price-${m.id}" value="${m.price}"></div>
              <div class="form-group" style="flex:1"><input type="number" class="form-input" id="em-dur-${m.id}" value="${m.duration}"></div>
            </div>
            <div class="form-group">
              <label style="font-size:13px">${t('menuImage')}</label>
              <input type="file" accept="image/*" id="em-img-${m.id}" style="font-size:13px">
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-primary btn-sm" onclick="submitEditMenu('${m.id}')">${t('save')}</button>
              <button class="btn btn-outline btn-sm" onclick="document.getElementById('edit-form-${m.id}').classList.add('hidden')">${t('cancel')}</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function showAddMenuForm() { document.getElementById('addMenuForm').classList.remove('hidden'); }
    function hideAddMenuForm() {
      document.getElementById('addMenuForm').classList.add('hidden');
      document.getElementById('newMenuTitle').value = '';
      document.getElementById('newMenuDesc').value = '';
      document.getElementById('newMenuPrice').value = '';
      document.getElementById('newMenuDuration').value = '';
    }

    async function addMenu() {
      const title = document.getElementById('newMenuTitle').value.trim();
      const price = document.getElementById('newMenuPrice').value;
      const duration = document.getElementById('newMenuDuration').value;
      if (!title || !price || !duration) return alert(t('fillAll'));
      let image_url = null;
      const imgFile = document.getElementById('newMenuImage').files[0];
      if (imgFile) { image_url = await uploadFile(imgFile); if (!image_url) return; }
      const res = await post(`/owner/shops/${currentShopId}/menus`, {
        title,
        description: document.getElementById('newMenuDesc').value,
        price: Number(price),
        duration: Number(duration),
        image_url,
      });
      if (res.ok) {
        alert(t('menuAdded'));
        hideAddMenuForm();
        loadMenuList();
      } else {
        const d = await res.json(); alert(d.error || 'Failed');
      }
    }

    function editMenu(id) {
      document.getElementById('edit-form-' + id).classList.toggle('hidden');
    }

    async function submitEditMenu(id) {
      const body = {
        title: document.getElementById('em-title-' + id).value,
        description: document.getElementById('em-desc-' + id).value,
        price: Number(document.getElementById('em-price-' + id).value),
        duration: Number(document.getElementById('em-dur-' + id).value),
      };
      const imgFile = document.getElementById('em-img-' + id).files[0];
      if (imgFile) { const url = await uploadFile(imgFile); if (!url) return; body.image_url = url; }
      const res = await patch(`/owner/menus/${id}`, body);
      if (res.ok) {
        alert(t('menuUpdated'));
        loadMenuList();
      } else {
        const d = await res.json(); alert(d.error || 'Failed');
      }
    }

    async function deleteMenu(id) {
      if (!confirm(t('confirmDelete'))) return;
      const res = await del(`/owner/menus/${id}`);
      if (res.ok) {
        alert(t('menuDeleted'));
        loadMenuList();
      } else {
        const d = await res.json(); alert(d.error || 'Failed');
      }
    }

    // ── Refund ───────────────────────────────────────────
    async function refundBooking(bookingId) {
      if (!confirm(t('confirmRefund'))) return;
      const res = await post(`/payments/${bookingId}/refund`);
      if (res.ok) {
        alert(t('refundSuccess'));
        loadOwnerBookings();
      } else {
        const d = await res.json();
        alert(d.error || t('refundFailed'));
      }
    }

    // ── Logout ───────────────────────────────────────────
    function ownerLogout() {
      localStorage.removeItem('access_token');
      localStorage.removeItem('refresh_token');
      location.reload();
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function formatPrice(w) { return new Intl.NumberFormat('ko-KR', {style:'currency',currency:'KRW'}).format(w); }
    function formatDate(iso) { return new Date(iso).toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }

    // Init
    renderLangSelector('ownerLang');
    applyI18n();
    document.getElementById('ownerTitle').textContent = t('shopDashboard');
    document.getElementById('ownerBackLink').textContent = t('backToApp');
    // Shop info labels
    document.getElementById('lbl-shopName').textContent = t('shopName');
    document.getElementById('lbl-shopAddr').textContent = t('shopAddress');
    document.getElementById('lbl-shopPhone').textContent = t('shopPhone');
    document.getElementById('lbl-shopDesc').textContent = t('shopDescription');
    document.getElementById('btnSaveShop').textContent = t('save');
    // Menu labels
    document.getElementById('btnAddMenu').textContent = t('addMenu');
    document.getElementById('lbl-menuTitle').textContent = t('menuTitle');
    document.getElementById('lbl-menuDesc').textContent = t('menuDesc');
    document.getElementById('lbl-menuPrice').textContent = t('menuPrice');
