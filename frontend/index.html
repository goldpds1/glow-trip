<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Glow Trip</title>
  <meta name="stripe-key" content="">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- ══ Header ══════════════════════════════════════ -->
  <div class="header">
    <button class="back-btn hidden" id="backBtn" onclick="goBack()">&#8592;</button>
    <h1 id="headerTitle">Glow Trip</h1>
    <div id="headerRight"><div id="headerLang"></div></div>
  </div>

  <!-- ══ Page: Auth ══════════════════════════════════ -->
  <div id="page-auth" class="page active">
    <div class="px-16 mt-16">
      <h2 class="text-center mb-16" style="font-size:24px" data-i18n="welcome"></h2>
      <div id="authLogin">
        <div class="form-group">
          <label data-i18n="email"></label>
          <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label data-i18n="password"></label>
          <input type="password" class="form-input" id="loginPassword" data-i18n-placeholder="pwPlaceholder">
        </div>
        <button class="btn btn-primary" onclick="doLogin()" data-i18n="login"></button>
        <div class="social-divider"><span data-i18n="or"></span></div>
        <div class="social-buttons">
          <button class="btn btn-social btn-google" onclick="socialLogin('google')">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.01 24.01 0 000 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google
          </button>
          <button class="btn btn-social btn-apple" onclick="socialLogin('apple')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
            Apple
          </button>
          <button class="btn btn-social btn-line" onclick="socialLogin('line')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386a.63.63 0 01-.63-.629V8.108c0-.345.282-.63.63-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016a.63.63 0 01-.63.629.626.626 0 01-.51-.262l-2.455-3.338v2.97c0 .344-.282.629-.631.629a.628.628 0 01-.629-.629V8.108a.63.63 0 01.629-.63c.2 0 .383.095.51.262l2.455 3.339V8.108c0-.345.283-.63.631-.63.346 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629a.628.628 0 01-.629-.629V8.108c0-.345.281-.63.629-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917a.63.63 0 01-.63-.629V8.108c0-.345.282-.63.63-.63.349 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
            LINE
          </button>
        </div>
        <p class="text-center mt-16" style="font-size:13px;color:var(--text-light)">
          <span data-i18n="noAccount"></span> <a href="#" onclick="showRegister()" data-i18n="signup"></a>
        </p>
      </div>
      <div id="authRegister" class="hidden">
        <div class="form-group">
          <label data-i18n="name"></label>
          <input type="text" class="form-input" id="regName" data-i18n-placeholder="namePlaceholder">
        </div>
        <div class="form-group">
          <label data-i18n="email"></label>
          <input type="email" class="form-input" id="regEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label data-i18n="password"></label>
          <input type="password" class="form-input" id="regPassword" data-i18n-placeholder="pwPlaceholder">
        </div>
        <div class="form-group">
          <label data-i18n="language"></label>
          <select class="form-input" id="regLang">
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
            <option value="ko">한국어</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="doRegister()" data-i18n="signup"></button>
        <div class="social-divider"><span data-i18n="or"></span></div>
        <div class="social-buttons">
          <button class="btn btn-social btn-google" onclick="socialLogin('google')">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.01 24.01 0 000 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google
          </button>
          <button class="btn btn-social btn-apple" onclick="socialLogin('apple')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
            Apple
          </button>
          <button class="btn btn-social btn-line" onclick="socialLogin('line')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386a.63.63 0 01-.63-.629V8.108c0-.345.282-.63.63-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016a.63.63 0 01-.63.629.626.626 0 01-.51-.262l-2.455-3.338v2.97c0 .344-.282.629-.631.629a.628.628 0 01-.629-.629V8.108a.63.63 0 01.629-.63c.2 0 .383.095.51.262l2.455 3.339V8.108c0-.345.283-.63.631-.63.346 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629a.628.628 0 01-.629-.629V8.108c0-.345.281-.63.629-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917a.63.63 0 01-.63-.629V8.108c0-.345.282-.63.63-.63.349 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
            LINE
          </button>
        </div>
        <p class="text-center mt-16" style="font-size:13px;color:var(--text-light)">
          <span data-i18n="hasAccount"></span> <a href="#" onclick="showLogin()" data-i18n="login"></a>
        </p>
      </div>
      <div id="authError" class="hidden" style="color:var(--danger);text-align:center;margin-top:12px;font-size:13px"></div>
    </div>
  </div>

  <!-- ══ Page: Shop List ═════════════════════════════ -->
  <div id="page-shops" class="page">
    <div class="search-bar">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" oninput="searchShops()">
    </div>
    <div style="display:flex;gap:8px;padding:0 16px 8px;align-items:center">
      <button class="btn btn-outline btn-sm" id="btnListView" onclick="setShopView('list')" data-i18n="listView"></button>
      <button class="btn btn-outline btn-sm" id="btnMapView" onclick="setShopView('map')" data-i18n="mapView"></button>
      <button class="btn btn-outline btn-sm" id="btnSortDistance" onclick="toggleDistanceSort()" data-i18n="sortDefault"></button>
    </div>
    <div id="shopList"></div>
    <div id="shopMap" class="hidden" style="height:400px;margin:0 16px;border-radius:12px;overflow:hidden"></div>
  </div>

  <!-- ══ Page: Shop Detail ═══════════════════════════ -->
  <div id="page-shop-detail" class="page">
    <div id="shopDetail"></div>
  </div>

  <!-- ══ Page: Booking Form ══════════════════════════ -->
  <div id="page-booking" class="page">
    <div class="px-16 mt-16">
      <h2 id="bookingMenuTitle" style="font-size:18px;margin-bottom:4px"></h2>
      <p id="bookingMenuMeta" class="card-sub mb-16"></p>
      <div class="form-group">
        <label data-i18n="dateTime"></label>
        <input type="datetime-local" class="form-input" id="bookingTime">
      </div>
      <div class="form-group">
        <label data-i18n="requestLabel"></label>
        <textarea class="form-input" id="bookingRequest" data-i18n-placeholder="requestPlaceholder"></textarea>
      </div>
      <button class="btn btn-primary" onclick="createBooking()" data-i18n="bookNow"></button>
      <div id="bookingError" class="hidden" style="color:var(--danger);text-align:center;margin-top:12px;font-size:13px"></div>
    </div>
  </div>

  <!-- ══ Page: Payment ════════════════════════════════ -->
  <div id="page-payment" class="page">
    <div class="px-16 mt-16">
      <h2 id="paymentTitle" style="font-size:18px;margin-bottom:4px"></h2>
      <p id="paymentAmount" class="card-sub mb-16"></p>
      <div class="form-group">
        <label data-i18n="cardInfo"></label>
        <div id="card-element" style="padding:12px;border:1px solid var(--border);border-radius:8px;background:#fff"></div>
        <div id="card-errors" style="color:var(--danger);font-size:13px;margin-top:8px"></div>
      </div>
      <button class="btn btn-primary" id="payBtn" onclick="submitPayment()" data-i18n="pay"></button>
    </div>
  </div>

  <!-- ══ Page: My Bookings ═══════════════════════════ -->
  <div id="page-bookings" class="page">
    <div id="bookingsList"></div>
  </div>

  <!-- ══ Page: My Page ═══════════════════════════════ -->
  <div id="page-mypage" class="page">
    <div class="px-16 mt-16">
      <div class="card"><div class="card-body" id="userInfo"></div></div>
      <button class="btn btn-outline mt-16" onclick="doLogout()" data-i18n="logout"></button>
      <div id="ownerLink" class="hidden mt-16">
        <button class="btn btn-primary" onclick="location.href='/owner'" data-i18n="goOwnerDash"></button>
      </div>
      <div id="adminLink" class="hidden mt-16">
        <button class="btn btn-primary" onclick="location.href='/admin'" data-i18n="goAdmin"></button>
      </div>
    </div>
  </div>

  <!-- ══ Bottom Nav ══════════════════════════════════ -->
  <div class="bottom-nav" id="bottomNav" style="display:none">
    <a href="#" onclick="navigate('shops')" id="nav-shops">
      <span class="icon">&#127978;</span><span data-i18n="navShops"></span>
    </a>
    <a href="#" onclick="navigate('bookings')" id="nav-bookings">
      <span class="icon">&#128197;</span><span data-i18n="navBookings"></span>
    </a>
    <a href="#" onclick="navigate('mypage')" id="nav-mypage">
      <span class="icon">&#128100;</span><span data-i18n="navMy"></span>
    </a>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/lang.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
