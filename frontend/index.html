<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Glow Trip</title>
  <meta name="stripe-key" content="">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <!-- Social Login SDKs -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js" async defer></script>
</head>
<body>

  <!-- ══ Header ══════════════════════════════════════ -->
  <div class="header">
    <button class="back-btn hidden" id="backBtn" onclick="goBack()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 id="headerTitle">Glow Trip</h1>
    <div id="headerRight"><div id="headerLang"></div></div>
  </div>

  <!-- ══ Page: Auth ══════════════════════════════════ -->
  <div id="page-auth" class="page active">
    <!-- Splash Landing -->
    <div id="authSplash" class="splash-screen">
      <div class="splash-logo">Glow Trip</div>
      <div class="splash-sub" data-i18n="findBeauty">Find your beauty in Korea</div>
      <div class="splash-actions">
        <button class="btn btn-primary" onclick="showLogin()" data-i18n="login"></button>
        <button class="btn btn-outline" onclick="showRegister()" data-i18n="signup"></button>
      </div>
      <div style="margin-top:24px"></div>
    </div>
    <!-- Login Form -->
    <div class="px-16 mt-16 hidden" id="authForms">
      <h2 class="text-center mb-16" style="font-size:24px" data-i18n="welcome"></h2>
      <div id="authLogin">
        <div class="form-group">
          <label data-i18n="email"></label>
          <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label data-i18n="password"></label>
          <input type="password" class="form-input" id="loginPassword" data-i18n-placeholder="pwPlaceholder">
        </div>
        <button class="btn btn-primary" onclick="doLogin()" data-i18n="login"></button>
        <div class="social-divider"><span data-i18n="or"></span></div>
        <div class="social-buttons">
          <button class="btn btn-social btn-google" onclick="socialLogin('google')">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.01 24.01 0 000 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google
          </button>
          <button class="btn btn-social btn-apple" onclick="socialLogin('apple')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
            Apple
          </button>
          <button class="btn btn-social btn-line" onclick="socialLogin('line')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386a.63.63 0 01-.63-.629V8.108c0-.345.282-.63.63-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016a.63.63 0 01-.63.629.626.626 0 01-.51-.262l-2.455-3.338v2.97c0 .344-.282.629-.631.629a.628.628 0 01-.629-.629V8.108a.63.63 0 01.629-.63c.2 0 .383.095.51.262l2.455 3.339V8.108c0-.345.283-.63.631-.63.346 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629a.628.628 0 01-.629-.629V8.108c0-.345.281-.63.629-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917a.63.63 0 01-.63-.629V8.108c0-.345.282-.63.63-.63.349 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
            LINE
          </button>
        </div>
        <p class="text-center mt-16" style="font-size:13px;color:var(--text-light)">
          <span data-i18n="noAccount"></span> <a href="#" onclick="showRegister()" data-i18n="signup"></a>
        </p>
      </div>
      <div id="authRegister" class="hidden">
        <div class="form-group">
          <label data-i18n="name"></label>
          <input type="text" class="form-input" id="regName" data-i18n-placeholder="namePlaceholder">
        </div>
        <div class="form-group">
          <label data-i18n="email"></label>
          <input type="email" class="form-input" id="regEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label data-i18n="password"></label>
          <input type="password" class="form-input" id="regPassword" data-i18n-placeholder="pwPlaceholder">
        </div>
        <div class="form-group">
          <label data-i18n="language"></label>
          <select class="form-input" id="regLang">
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
            <option value="ko">한국어</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="doRegister()" data-i18n="signup"></button>
        <div class="social-divider"><span data-i18n="or"></span></div>
        <div class="social-buttons">
          <button class="btn btn-social btn-google" onclick="socialLogin('google')">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.01 24.01 0 000 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google
          </button>
          <button class="btn btn-social btn-apple" onclick="socialLogin('apple')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
            Apple
          </button>
          <button class="btn btn-social btn-line" onclick="socialLogin('line')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386a.63.63 0 01-.63-.629V8.108c0-.345.282-.63.63-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016a.63.63 0 01-.63.629.626.626 0 01-.51-.262l-2.455-3.338v2.97c0 .344-.282.629-.631.629a.628.628 0 01-.629-.629V8.108a.63.63 0 01.629-.63c.2 0 .383.095.51.262l2.455 3.339V8.108c0-.345.283-.63.631-.63.346 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629a.628.628 0 01-.629-.629V8.108c0-.345.281-.63.629-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917a.63.63 0 01-.63-.629V8.108c0-.345.282-.63.63-.63.349 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
            LINE
          </button>
        </div>
        <p class="text-center mt-16" style="font-size:13px;color:var(--text-light)">
          <span data-i18n="hasAccount"></span> <a href="#" onclick="showLogin()" data-i18n="login"></a>
        </p>
      </div>
      <div id="authError" class="hidden" style="color:var(--danger);text-align:center;margin-top:12px;font-size:13px"></div>
    </div>
  </div>
  </div>

  <!-- ══ Page: Home ══════════════════════════════════ -->
  <div id="page-home" class="page">
    <div class="search-bar">
      <span class="search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input type="text" id="homeSearchInput" data-i18n-placeholder="searchPlaceholder" oninput="searchFromHome()">
    </div>
    <div id="categoryTags" class="category-bar"></div>
    <div class="px-16">
      <h3 class="section-title" data-i18n="popularClinics">Popular Clinics</h3>
    </div>
    <div id="popularShopsScroll" class="horizontal-scroll"></div>
    <div class="px-16 mt-16">
      <h3 class="section-title" data-i18n="recommendedShops">Recommended</h3>
    </div>
    <div id="homeShopGrid" class="shop-grid"></div>
  </div>

  <!-- ══ Page: Shop List ═════════════════════════════ -->
  <div id="page-shops" class="page">
    <div class="search-bar">
      <span class="search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" oninput="searchShops()">
    </div>
    <div style="display:flex;gap:8px;padding:0 16px 8px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" id="btnListView" onclick="setShopView('list')" data-i18n="listView"></button>
      <button class="btn btn-outline btn-sm" id="btnMapView" onclick="setShopView('map')" data-i18n="mapView"></button>
      <select class="form-input" id="shopSortSelect" onchange="changeShopSort()" style="padding:4px 8px;font-size:12px;border-radius:6px;flex:0 0 auto;width:auto">
        <option value=""   data-i18n="sortNewest"></option>
        <option value="popular" data-i18n="sortPopular"></option>
        <option value="rating"  data-i18n="sortRating"></option>
        <option value="price"   data-i18n="sortPrice"></option>
        <option value="distance" data-i18n="sortDistance"></option>
      </select>
      <button class="btn btn-outline btn-sm" id="btnFilter" onclick="toggleFilterPanel()" data-i18n="filterLabel"></button>
    </div>
    <div id="filterPanel" class="hidden" style="padding:0 16px 12px">
      <div class="card"><div class="card-body" style="display:flex;flex-wrap:wrap;gap:10px;align-items:end">
        <div style="flex:1;min-width:100px">
          <label style="font-size:11px;color:var(--text-light)" data-i18n="priceMin"></label>
          <input type="number" class="form-input" id="filterPriceMin" style="padding:4px 8px;font-size:12px" placeholder="0">
        </div>
        <div style="flex:1;min-width:100px">
          <label style="font-size:11px;color:var(--text-light)" data-i18n="priceMax"></label>
          <input type="number" class="form-input" id="filterPriceMax" style="padding:4px 8px;font-size:12px" placeholder="∞">
        </div>
        <div style="flex:1;min-width:100px">
          <label style="font-size:11px;color:var(--text-light)" data-i18n="filterRating"></label>
          <select class="form-input" id="filterMinRating" style="padding:4px 8px;font-size:12px">
            <option value="">-</option>
            <option value="3">3+</option>
            <option value="4">4+</option>
            <option value="4.5">4.5+</option>
          </select>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="applyFilters()" data-i18n="filterApply"></button>
          <button class="btn btn-outline btn-sm" onclick="resetFilters()" data-i18n="filterReset"></button>
        </div>
      </div></div>
    </div>
    <div id="shopList"></div>
    <div id="shopMap" class="hidden" style="height:400px;margin:0 16px;border-radius:12px;overflow:hidden"></div>
  </div>

  <!-- ══ Page: Shop Detail ═══════════════════════════ -->
  <div id="page-shop-detail" class="page">
    <div id="shopDetail"></div>
  </div>

  <!-- ══ Page: Booking Form ══════════════════════════ -->
  <div id="page-booking" class="page">
    <div class="px-16 mt-16">
      <h2 id="bookingMenuTitle" style="font-size:18px;margin-bottom:4px"></h2>
      <p id="bookingMenuMeta" class="card-sub mb-16"></p>

      <!-- Date Picker (horizontal scroll) -->
      <div class="date-scroll" id="dateScroll"></div>

      <!-- Time Slot Grid -->
      <div class="slot-grid" id="slotGrid">
        <div class="loading" data-i18n="selectDate">Select a date</div>
      </div>

      <div class="form-group mt-16">
        <label data-i18n="requestLabel"></label>
        <textarea class="form-input" id="bookingRequest" data-i18n-placeholder="requestPlaceholder"></textarea>
      </div>

      <div class="booking-actions">
        <button class="btn btn-book" onclick="createBooking()" data-i18n="bookNow"></button>
      </div>

      <div class="refund-policy" data-i18n="refundPolicy"></div>
      <div id="bookingError" class="hidden" style="color:var(--danger);text-align:center;margin-top:12px;font-size:13px"></div>

      <!-- Hidden field for selected datetime -->
      <input type="hidden" id="bookingTime">
    </div>
  </div>

  <!-- ══ Page: Booking Complete ═══════════════════════ -->
  <div id="page-booking-complete" class="page">
    <div class="complete-screen">
      <div style="font-size:48px;margin-bottom:16px">&#10003;</div>
      <h2 id="completeTitle" data-i18n="bookingComplete">Booking Confirmed!</h2>
      <div id="completeSummary" style="margin:16px 0;font-size:14px;color:var(--text-light)"></div>
      <button class="btn btn-primary mt-16" onclick="navigate('home')" data-i18n="backToHome">Back to Home</button>
    </div>
  </div>

  <!-- ══ Page: Payment ════════════════════════════════ -->
  <div id="page-payment" class="page">
    <div class="px-16 mt-16">
      <h2 id="paymentTitle" style="font-size:18px;margin-bottom:4px"></h2>
      <p id="paymentAmount" class="card-sub mb-16"></p>
      <div class="form-group">
        <label data-i18n="cardInfo"></label>
        <div id="card-element" style="padding:12px;border:1px solid var(--border);border-radius:8px;background:#fff"></div>
        <div id="card-errors" style="color:var(--danger);font-size:13px;margin-top:8px"></div>
      </div>
      <button class="btn btn-primary" id="payBtn" onclick="submitPayment()" data-i18n="pay"></button>
    </div>
  </div>

  <!-- ══ Page: My Bookings ═══════════════════════════ -->
  <div id="page-bookings" class="page">
    <div id="bookingsList"></div>
  </div>

  <!-- ══ Page: My Page ═══════════════════════════════ -->
  <div id="page-mypage" class="page">
    <div class="px-16 mt-16">
      <div class="card"><div class="card-body" id="userInfo"></div></div>
      <div id="profileEditForm" class="card hidden mt-16">
        <div class="card-body">
          <div class="form-group">
            <label class="form-label" data-i18n="profileName"></label>
            <input type="text" class="form-input" id="editName" maxlength="100">
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="profilePhone"></label>
            <input type="tel" class="form-input" id="editPhone" maxlength="30">
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="profileLang"></label>
            <select class="form-input" id="editLang">
              <option value="ko">한국어</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="zh">中文</option>
            </select>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-primary" onclick="saveProfile()" data-i18n="profileSave"></button>
            <button class="btn btn-outline" onclick="cancelEditProfile()" data-i18n="profileCancel"></button>
          </div>
        </div>
      </div>
      <div id="favoritesSection" class="mt-16">
        <h3 class="section-title" data-i18n="myFavorites"></h3>
        <div id="favoritesList"></div>
      </div>
      <button class="btn btn-outline mt-16" onclick="doLogout()" data-i18n="logout"></button>
      <div id="ownerLink" class="hidden mt-16">
        <button class="btn btn-primary" onclick="location.href='/owner'" data-i18n="goOwnerDash"></button>
      </div>
      <div id="adminLink" class="hidden mt-16">
        <button class="btn btn-primary" onclick="location.href='/admin'" data-i18n="goAdmin"></button>
      </div>
    </div>
  </div>

  <!-- ══ Bottom Nav ══════════════════════════════════ -->
  <div class="bottom-nav" id="bottomNav" style="display:none">
    <a href="#" onclick="navigate('home')" id="nav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span data-i18n="navHome">Home</span>
    </a>
    <a href="#" onclick="navigate('shops')" id="nav-shops">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v4H3zM3 7v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"/><path d="M8 7v0a2 2 0 0 1-4 0"/><path d="M12 7v0a2 2 0 0 1-4 0"/><path d="M16 7v0a2 2 0 0 1-4 0"/><path d="M20 7v0a2 2 0 0 1-4 0"/></svg>
      <span data-i18n="navShops">Shops</span>
    </a>
    <a href="#" onclick="navigate('mypage')" id="nav-mypage">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span data-i18n="navProfile">Profile</span>
    </a>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/lang.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
