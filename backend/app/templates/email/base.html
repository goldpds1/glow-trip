<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FAF8F5; color: #2D2D2D; }
  .wrapper { max-width: 560px; margin: 0 auto; padding: 32px 20px; }
  .logo { text-align: center; padding: 24px 0; }
  .logo span { font-size: 22px; font-weight: 700; color: #6B8F71; }
  .card { background: #fff; border-radius: 16px; padding: 28px 24px; box-shadow: 0 2px 12px rgba(0,0,0,.04); }
  .card h2 { margin: 0 0 16px; font-size: 20px; color: #2D2D2D; }
  .card p { margin: 8px 0; font-size: 14px; line-height: 1.6; color: #6B6B6B; }
  .footer { text-align: center; padding: 24px 0; font-size: 12px; color: #AAAAAA; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="logo"><span>Glow Trip</span></div>
  <div class="card">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    &copy; 2026 Glow Trip &mdash;
    {% if lang == 'ko' %}본 메일은 자동 발송되었습니다.
    {% elif lang == 'ja' %}このメールは自動送信されました。
    {% elif lang == 'zh' %}此邮件为自动发送。
    {% else %}This email was sent automatically.
    {% endif %}
  </div>
</div>
</body>
</html>
